name: Build Linux Agent

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./ -> target

      - name: Build release
        run: |
          cd Agent
          cargo build --release

      - name: Build single installer
        run: |
          cd Agent
          
          # 创建单个自解压安装包
          INSTALLER="xsec-agent-1.0.0-linux-x86_64.sh"
          
          # 复制安装脚本作为基础
          cp scripts/install.sh ../$INSTALLER
          
          # 添加标记和二进制
          echo "" >> ../$INSTALLER
          echo "---BINARY END---" >> ../$INSTALLER
          base64 -w0 target/release/xsec-agent >> ../$INSTALLER
          
          # 添加执行权限
          chmod +x ../$INSTALLER
          
          ls -la ../$INSTALLER

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsec-agent-linux-installer
          path: xsec-agent-1.0.0-linux-x86_64.sh
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: xsec-agent-1.0.0-linux-x86_64.sh
