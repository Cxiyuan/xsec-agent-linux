name: Build Linux Agent

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./ -> target

      - name: Build release
        run: |
          cd Agent
          cargo build --release

      - name: Build installer script
        run: |
          mkdir -p dist
          
          # Create self-extracting installer
          cp Agent/scripts/install.sh dist/xsec-agent-${VERSION:-1.0.0}-linux-x86_64.sh
          echo "" >> dist/xsec-agent-${VERSION:-1.0.0}-linux-x86_64.sh
          echo "---BINARY END---" >> dist/xsec-agent-${VERSION:-1.0.0}-linux-x86_64.sh
          base64 -w0 < Agent/target/release/xsec-agent >> dist/xsec-agent-${VERSION:-1.0.0}-linux-x86_64.sh
          chmod +x dist/xsec-agent-${VERSION:-1.0.0}-linux-x86_64.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsec-agent-linux
          path: |
            dist/xsec-agent-*-linux-x86_64.sh
            Agent/target/release/xsec-agent
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/xsec-agent-*-linux-x86_64.sh
            Agent/target/release/xsec-agent
