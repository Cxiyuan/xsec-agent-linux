name: Build Linux Agent

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build static release
        run: |
          cd Agent
          # 使用 musl 目标编译静态二进制，兼容所有 Linux
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Build installer
        run: |
          cd Agent
          mkdir -p ../dist
          
          INSTALLER="../dist/xsec-agent-1.0.0-linux-x86_64.sh"
          
          # 复制安装脚本
          cp scripts/install.sh "$INSTALLER"
          
          # 添加标记和二进制
          echo "" >> "$INSTALLER"
          echo "---BINARY END---" >> "$INSTALLER"
          # 使用静态编译的二进制
          base64 -w0 target/x86_64-unknown-linux-musl/release/xsec-agent >> "$INSTALLER"
          
          chmod +x "$INSTALLER"
          
          echo "构建完成: $(du -h "$INSTALLER" | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsec-agent-linux-installer
          path: dist/xsec-agent-1.0.0-linux-x86_64.sh
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/xsec-agent-1.0.0-linux-x86_64.sh
